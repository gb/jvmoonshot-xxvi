services:
  lapada:
    image: ghcr.io/gb/lapada:v13
    platform: linux/amd64
    container_name: rinha-lb
    ports:
      - "9999:9999"
    environment:
      FD_UPSTREAMS: "/sockets/api1-fd.sock,/sockets/api2-fd.sock"
    volumes:
      - sockets:/sockets
    depends_on:
      - api1
      - api2
    ulimits:
      nofile:
        soft: 65535
        hard: 65535
    deploy:
      resources:
        limits:
          cpus: "0.10"
          memory: "10M"

  api1:
    image: ghcr.io/gb/jvmoonshot-xxvi:v16
    platform: linux/amd64
    container_name: rinha-api1
    environment:
      LISTEN_SOCKET: /sockets/api1.sock
      FD_SOCKET: /sockets/api1-fd.sock
      KDTREE_RELAX_SOFT_CAP: "900"
      KDTREE_RELAX_RANGE: "700"
      KDTREE_RELAX_EPSILON: "0"
      FRAUD_CACHE_BITS: "0"
    volumes:
      - sockets:/sockets
    ulimits:
      nofile:
        soft: 65535
        hard: 65535
    deploy:
      resources:
        limits:
          cpus: "0.45"
          memory: "170M"

  api2:
    image: ghcr.io/gb/jvmoonshot-xxvi:v16
    platform: linux/amd64
    container_name: rinha-api2
    environment:
      LISTEN_SOCKET: /sockets/api2.sock
      FD_SOCKET: /sockets/api2-fd.sock
      KDTREE_RELAX_SOFT_CAP: "900"
      KDTREE_RELAX_RANGE: "700"
      KDTREE_RELAX_EPSILON: "0"
      FRAUD_CACHE_BITS: "0"
    volumes:
      - sockets:/sockets
    ulimits:
      nofile:
        soft: 65535
        hard: 65535
    deploy:
      resources:
        limits:
          cpus: "0.45"
          memory: "170M"

volumes:
  sockets:
    driver: local
    driver_opts:
      type: tmpfs
      device: tmpfs
      o: size=1m,mode=1777

networks:
  default:
    driver: bridge
