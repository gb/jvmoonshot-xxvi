services:
  lb:
    image: ghcr.io/gb/lapada:v16
    platform: linux/amd64
    container_name: rinha-lb
    ports:
      - "9999:9999"
    environment:
      FD_UPSTREAMS: "/sockets/api1-fd.sock,/sockets/api2-fd.sock"
    volumes:
      - sockets:/sockets
    depends_on:
      api1:
        condition: service_healthy
      api2:
        condition: service_healthy
    ulimits:
      nofile:
        soft: 65535
        hard: 65535
    mem_limit: "30m"
    memswap_limit: "30m"
    pids_limit: 32
    deploy:
      resources:
        limits:
          cpus: "0.16"
          memory: "30M"
          pids: 32

  api1:
    image: ghcr.io/gb/jvmoonshot-xxvi:v22
    platform: linux/amd64
    container_name: rinha-api1
    environment:
      LISTEN_SOCKET: /sockets/api1.sock
      FD_SOCKET: /sockets/api1-fd.sock
      READY_FILE: /sockets/api1.ready
      KDTREE_EARLY_DIST_MILLI: "155"
      KDTREE_REFINE_BOUNDARY: "1"
      KDTREE_PRIME_PLUNGE_CAP: "1"
      KDTREE_RELAX_SOFT_CAP: "900"
      KDTREE_RELAX_RANGE: "700"
      KDTREE_RELAX_EPSILON: "0"
      FRAUD_CACHE_BITS: "0"
    volumes:
      - sockets:/sockets
    healthcheck:
      test: ["CMD-SHELL", "test -f /sockets/api1.ready && test -S /sockets/api1-fd.sock"]
      interval: 30s
      timeout: 1s
      retries: 30
      start_period: 60s
      start_interval: 1s
    ulimits:
      nofile:
        soft: 65535
        hard: 65535
    mem_limit: "160m"
    memswap_limit: "160m"
    pids_limit: 200
    deploy:
      resources:
        limits:
          cpus: "0.42"
          memory: "160M"
          pids: 200

  api2:
    image: ghcr.io/gb/jvmoonshot-xxvi:v22
    platform: linux/amd64
    container_name: rinha-api2
    environment:
      LISTEN_SOCKET: /sockets/api2.sock
      FD_SOCKET: /sockets/api2-fd.sock
      READY_FILE: /sockets/api2.ready
      KDTREE_EARLY_DIST_MILLI: "155"
      KDTREE_REFINE_BOUNDARY: "1"
      KDTREE_PRIME_PLUNGE_CAP: "1"
      KDTREE_RELAX_SOFT_CAP: "900"
      KDTREE_RELAX_RANGE: "700"
      KDTREE_RELAX_EPSILON: "0"
      FRAUD_CACHE_BITS: "0"
    volumes:
      - sockets:/sockets
    healthcheck:
      test: ["CMD-SHELL", "test -f /sockets/api2.ready && test -S /sockets/api2-fd.sock"]
      interval: 30s
      timeout: 1s
      retries: 30
      start_period: 60s
      start_interval: 1s
    ulimits:
      nofile:
        soft: 65535
        hard: 65535
    mem_limit: "160m"
    memswap_limit: "160m"
    pids_limit: 200
    deploy:
      resources:
        limits:
          cpus: "0.42"
          memory: "160M"
          pids: 200

volumes:
  sockets:
    driver: local
    driver_opts:
      type: tmpfs
      device: tmpfs
      o: size=1m,mode=1777

networks:
  default:
    driver: bridge
