# Contest cap: 1.0 CPU + 350 MB total.
#   lb    0.16 CPU + 16 MB
#   api1  0.42 CPU + 167 MB
#   api2  0.42 CPU + 167 MB
#   total 1.00 CPU + 350 MB
services:
  lb:
    image: ghcr.io/gb/lapada:v7
    platform: linux/amd64
    container_name: rinha-lb
    ports:
      - "9999:9999"
    environment:
      FD_UPSTREAMS: "/sockets/api1-fd.sock,/sockets/api2-fd.sock"
    volumes:
      - sockets:/sockets
    depends_on:
      - api1
      - api2
    sysctls:
      net.core.somaxconn: 4096
      net.ipv4.tcp_max_syn_backlog: 4096
      net.ipv4.tcp_tw_reuse: 1
      net.ipv4.tcp_fin_timeout: 10
      net.ipv4.ip_local_port_range: "15000 64000"
      net.ipv6.conf.all.disable_ipv6: 1
    ulimits:
      nofile:
        soft: 65535
        hard: 65535
    deploy:
      resources:
        limits:
          cpus: "0.16"
          memory: "16M"

  api1:
    image: ghcr.io/gb/jvmoonshot-xxvi:v8
    container_name: ${INSTANCE:-rinha}-api1
    environment:
      LISTEN_SOCKET: /sockets/api1.sock
      FD_SOCKET: /sockets/api1-fd.sock
      JIT_LOG: ${JIT_LOG:-}
    volumes:
      - sockets:/sockets
    sysctls:
      net.core.somaxconn: 4096
      net.ipv4.tcp_max_syn_backlog: 4096
      net.ipv4.tcp_tw_reuse: 1
      net.ipv6.conf.all.disable_ipv6: 1
    ulimits:
      nofile:
        soft: 65535
        hard: 65535
    deploy:
      resources:
        limits:
          cpus: "0.42"
          memory: "167M"

  api2:
    image: ghcr.io/gb/jvmoonshot-xxvi:v8
    container_name: ${INSTANCE:-rinha}-api2
    environment:
      LISTEN_SOCKET: /sockets/api2.sock
      FD_SOCKET: /sockets/api2-fd.sock
      JIT_LOG: ${JIT_LOG:-}
    volumes:
      - sockets:/sockets
    sysctls:
      net.core.somaxconn: 4096
      net.ipv4.tcp_max_syn_backlog: 4096
      net.ipv4.tcp_tw_reuse: 1
      net.ipv6.conf.all.disable_ipv6: 1
    ulimits:
      nofile:
        soft: 65535
        hard: 65535
    deploy:
      resources:
        limits:
          cpus: "0.42"
          memory: "167M"

volumes:
  sockets:
    driver: local
    driver_opts:
      type: tmpfs
      device: tmpfs
      o: size=1m,mode=1777

networks:
  default:
    driver: bridge
